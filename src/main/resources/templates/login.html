<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
</head>
<body style="margin:0; background:#f3f4f6; font-family:Arial, sans-serif; min-height:100vh;">

    <div style="max-width:1100px; margin:30px auto; padding:0 20px;">

        <div style="background:#1f2937; color:white; padding:16px 20px; margin-bottom:40px; border-radius:12px;">
            <div style="font-size:24px; font-weight:bold;">Appointment Scheduler</div>
            <div style="margin-top:6px; font-size:14px;">
                <strong>Course:</strong> CSCI-P566
                &nbsp; | &nbsp;
                <strong>Project:</strong> Project I
                &nbsp; | &nbsp;
                <strong>Creator:</strong> Dustin Tran
            </div>
        </div>

        <div style="display:flex; justify-content:center; align-items:center; min-height:65vh;">
            <div style="background:rgb(255, 255, 255); width:100%; max-width:420px; padding:32px; border-radius:16px; box-shadow:0 8px 24px rgba(0,0,0,0.12);">

                <h1 style="margin:0 0 8px 0; text-align:center; font-size:30px; color:#111827;">
                    Login
                </h1>
                <p style="margin:0 0 24px 0; text-align:center; color:#6b7280;">
                    Sign in to access the appointment scheduler
                </p>

                <div th:if="${param.error}"
                     style="background:#fee2e2; color:#991b1b; padding:10px 12px; border-radius:8px; margin-bottom:14px; font-size:14px;">
                    Invalid username or password
                </div>

                <div th:if="${param.logout}"
                     style="background:#dcfce7; color:#166534; padding:10px 12px; border-radius:8px; margin-bottom:14px; font-size:14px;">
                    You have been logged out
                </div>

                <form th:action="@{/login}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                    <div style="margin-bottom:18px;">
                        <label style="display:block; margin-bottom:8px; font-weight:600; color:#374151;">
                            Username
                        </label>
                        <input name="username"
                               type="text"
                               placeholder="Enter your username"
                               style="width:100%; padding:12px 14px; border:1px solid #d1d5db; border-radius:10px; box-sizing:border-box; font-size:15px; outline:none;" />
                    </div>

                    <div style="margin-bottom:22px;">
                        <label style="display:block; margin-bottom:8px; font-weight:600; color:#374151;">
                            Password
                        </label>
                        <input name="password"
                               type="password"
                               placeholder="Enter your password"
                               style="width:100%; padding:12px 14px; border:1px solid #d1d5db; border-radius:10px; box-sizing:border-box; font-size:15px; outline:none;" />
                    </div>

                    <button type="submit"
                            style="width:100%; background:#1f2937; color:white; border:none; padding:12px 16px; border-radius:10px; font-size:15px; font-weight:600; cursor:pointer;">
                        Login
                    </button>
                </form>
            </div>
        </div>

    </div>

</body>
</html>
