<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Slots</title>
</head>
<body>
    <h1>Available Appointment Slot</h1>
    <p>You are logged in as a student.</p>

    <div th:if="${message}" th:text="${message}" style="color:green;"></div>
    <div th:if="${error}" th:text="${error}" style="color:red;"></div>

    <table border="1" cellpadding="6">
        <thead>
            <tr>
                <th>Title</th>
                <th>Type</th>
                <th>Start</th>
                <th>End</th>
                <th>Location</th>
                <th>Capacity</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="s : ${slots}">
                <td th:text="${s.title}"></td>
                <td th:text="${s.type}"></td>
                <td th:text="${#temporals.format(s.startTime, 'yyyy-MM-dd HH:mm')}"></td>
                <td th:text="${#temporals.format(s.endTime, 'yyyy-MM-dd HH:mm')}"></td>
                <td th:text="${s.location}"></td>
                <td th:text="${s.capacity}"></td>
                <td>
                    <form th:action="@{/student/slots/{id}/book(id=${s.id})}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                        <button type="submit" th:disabled="${bookedSlotIds.contains(s.id)}">
                            Book
                        </button>
                    </form>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(slots)}">
                <td colspan="7">No available slots</td>
            </tr>
        </tbody>
    </table>

    <h2>My appointment</h2>

    <table border="1" cellpadding="6">
        <thead>
            <tr>
                <th>Title</th>
                <th>Type</th>
                <th>Start</th>
                <th>End</th>
                <th>Location</th>
            </tr>
        </thead>
        <tbody>
            <tr th:if="${#lists.isEmpty(myAppointments)}">
                <td colspan="5">You have not booked any appointments yet.</td>
            </tr>

            <tr th:each="a : ${myAppointments}">
                <td th:text="${a.slot.title}"></td>
                <td th:text="${a.slot.type}"></td>
                <td th:text="${#temporals.format(a.slot.startTime, 'yyyy-MM-dd HH:mm')}"></td>
                <td th:text="${#temporals.format(a.slot.endTime, 'yyyy-MM-dd HH:mm')}"></td>
                <td th:text="${a.slot.location}"></td>
            </tr>
        </tbody>
    </table>

    <form th:action="@{/logout}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
        <button type="submit">Logout</button>
    </form>
</body>
</html>
